<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rajendra ❤️ Gudiya Wedding</title>

<meta property="og:title" content="Rajendra ❤️ Gudiya Wedding Invitation">
<meta property="og:description" content="You are invited to celebrate our special day 💍 29 April 2026">
<meta property="og:image" content="https://wedding-wishes.github.io/wedding-invite/couple.jpg">
<meta property="og:url" content="https://wedding-wishes.github.io/wedding-invite/">
<meta name="twitter:card" content="summary_large_image">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #5a0f2e, #1a1a1a);
    color: white;
    text-align: center;
}

section {
    padding: 20px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    animation: fadeIn 1s ease-in;
}

h1, h2 {
    color: gold;
    margin: 6px 0;
}

.countdown {
    font-size: 1.4rem;
    color: #ffd700;
}

.card {
    background: rgba(255,255,255,0.07);
    padding: 14px;
    border-radius: 14px;
    margin: 10px auto;
    max-width: 320px;
}

.card img {
    width: 100%;
    max-width: 260px;
    border-radius: 10px;
    border: 3px solid gold;
}

input {
    padding: 8px;
    border-radius: 8px;
    border: none;
    width: 200px;
}

button {
    padding: 8px 16px;
    background: gold;
    border: none;
    border-radius: 10px;
    margin-top: 10px;
    font-weight: bold;
}

.flower {
    position: fixed;
    top: -50px;
    font-size: 18px;
    animation: fall linear infinite;
    z-index: 999;
}

@keyframes fall {
    0% { transform: translateY(-50px); }
    100% { transform: translateY(100vh); }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="music" autoplay loop muted playsinline preload="auto">
  <source src="https://cdn.pixabay.com/audio/2022/10/30/audio_82b3e66a39.mp3" type="audio/mpeg">
  <source src="https://cdn.pixabay.com/audio/2022/11/17/audio_ed78cb0a59.mp3" type="audio/mpeg">
  <source src="https://cdn.pixabay.com/audio/2023/01/04/audio_2dde668d05.mp3" type="audio/mpeg">
</audio>

<!-- 🎉 HERO -->
<section>
    <h1>Rajendra ❤️ Gudiya Wedding</h1>
    <p style="color:rgba(255,255,255,0.7)">With love, we invite you 💍</p>
    <div class="countdown" id="countdown">Loading...</div>
</section>

<!-- 💑 COUPLE -->
<section> <h2>💑 Rajendra ❤️ Gudiya</h2> <div class="card"> <img src="couple.jpg.jpeg" alt="Couple Photo"> <p><b>Ek nayi zindagi ki shuruaat...</b></p> <p><i style="color:rgba(255,215,0,0.85);">"Do dil, ek bandhan, aur ek nayi kahani..."</i></p> </div> </section>

<!-- 📅 DETAILS -->
<section>
    <h2>Wedding Details</h2>
    <p>📅 29 April 2026</p>
    <p>📍 Saibasi, Uttar Pradesh</p>
</section>

<!-- 📩 RSVP -->
<section>
    <h2>RSVP</h2>
    <input type="text" id="name" placeholder="Enter your name"><br>
    <button onclick="sendData()">Confirm</button>
    <p id="status"></p>
</section>

<script>
// 🎵 AUTO MUSIC FIX
var audio = document.getElementById("music");

// Try autoplay (muted)
window.addEventListener("load", function () {
    audio.play().catch(() => {});
});

// Unmute on ANY interaction (no button)
function unlockAudio() {
    audio.muted = false;
    audio.play().catch(() => {});

    document.removeEventListener("click", unlockAudio);
    document.removeEventListener("touchstart", unlockAudio);
    document.removeEventListener("scroll", unlockAudio);
}

// Multiple triggers
document.addEventListener("click", unlockAudio);
document.addEventListener("touchstart", unlockAudio);
document.addEventListener("scroll", unlockAudio);

// ⏳ COUNTDOWN
var weddingDate = new Date("April 29, 2026 17:00:00").getTime();

setInterval(function () {
    var now = new Date().getTime();
    var distance = weddingDate - now;

    var days = Math.floor(distance / (1000*60*60*24));
    var hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));

    document.getElementById("countdown").innerHTML =
        days + " Days " + hours + " Hrs";
}, 1000);

// 📩 RSVP
function sendData() {
    var name = document.getElementById("name").value;

    if (name === "") {
        alert("Enter your name");
        return;
    }

    document.getElementById("status").innerText = "Thank you 😊";
}

// 🌸 FLOWERS
var flowerEmojis = ['🌸', '🌺', '🌼', '🌻']; function createFlower() { var flower = document.createElement('div'); flower.classList.add('flower'); flower.innerHTML = flowerEmojis[Math.floor(Math.random() * flowerEmojis.length)]; flower.style.left = Math.random() * window.innerWidth + 'px'; flower.style.animationDuration = (3 + Math.random() * 5) + 's'; flower.style.fontSize = (14 + Math.random() * 14) + 'px'; document.body.appendChild(flower); setTimeout(function () { flower.remove(); }, 8000); } setInterval(createFlower, 600); </script> </body> </html>
